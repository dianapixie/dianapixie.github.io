<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Mijn Galerie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Mijn Tekeningen</h1>

<div id="gallery"></div>

<script>
const images = [
    "Leentjuh.png",
	"Leentjuh1.png",
	"tekening1.jpg",
    "tekening2.jpg"
    // 👉 hier gewoon nieuwe namen toevoegen
];

const gallery = document.getElementById("gallery");

images.forEach(img => {
    const el = document.createElement("img");
    el.src = "drawings/" + img;
    gallery.appendChild(el);
});
</script>

</body>
</html>
