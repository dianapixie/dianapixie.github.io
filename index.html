<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Mijn Galerie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Mijn Tekeningen</h1>

<div id="gallery"></div>

<script>
const images = [
	"1.jpg",
    "2.jpg",
	"3.jpg",
    "4.jpg",
	"5.jpg",
    "6.jpg",
	"7.jpg",
    "8.jpg",
	"9.jpg",
    "10.jpg",
	"11.jpg"
    // 👉 hier gewoon nieuwe namen toevoegen
];

const gallery = document.getElementById("gallery");

images.forEach(img => {
    const el = document.createElement("img");
    el.src = "drawings/" + img;
    gallery.appendChild(el);
});
</script>

</body>
</html>
